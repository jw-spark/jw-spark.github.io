<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bus Intelligence Dashboard</title>
</head>
<body>

<h2>🚌 Bus Intelligence Dashboard</h2>
<pre id="status">Starting...</pre>

<script src="config.js"></script>
<script>

const statusEl = document.getElementById("status");

function log(msg){
    console.log(msg);
    statusEl.innerText += msg + "
";
}

async function fetchAndStore(){
    try {
        const stop = CONFIG.BUS_STOPS[0];

        log("Fetching API...");
        const resp = await fetch("https://arrivelah2.busrouter.sg/?id=" + stop);
        const data = await resp.json();

        let records = [];

        data.services.forEach(function(svc){

            ["next","next2","next3"].forEach(function(seq){

                const b = svc[seq];
                if (!b || !b.time) return;

                records.push({
                    bus_stop_code: stop,
                    service_no: svc.no,
                    operator: svc.operator || null,
                    sequence: seq,
                    estimated_arrival: b.time,
                    latitude: b.lat || null,
                    longitude: b.lng || null,
                    load: b.load || null,
                    bus_type: b.type || null,
                    feature: b.feature || null,
                    is_monitored: b.monitored === 1,
                    collected_at: new Date().toISOString()
                });

            });

        });

        // ✅ DEBUG LOG - mapping check
        console.log("Sample record:", records[0]);
        log("Sample record printed in console (F12)");

        if (records.length === 0) {
            log("No data to insert");
            return;
        }

        await fetch(CONFIG.SUPABASE_URL + "/rest/v1/bus_arrivals", {
            method: "POST",
            headers: {
                "apikey": CONFIG.SUPABASE_KEY,
                "Authorization": "Bearer " + CONFIG.SUPABASE_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(records)
        });

        log("Insert success");

    } catch (e) {
        log("ERROR: " + e.message);
    }
}

fetchAndStore();
setInterval(fetchAndStore, CONFIG.REFRESH_INTERVAL_MS);

</script>

</body>
</html>
