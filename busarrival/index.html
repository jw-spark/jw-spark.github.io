<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bus Intelligence Dashboard V4.1</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    padding: 20px;
    margin: 0;
}
h2, h3 {
    margin-top: 0;
}
.section {
    margin-bottom: 24px;
}
.card {
    background: #1c1c1c;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    padding: 12px;
    margin: 8px 0;
}
.bus-no {
    font-size: 20px;
    font-weight: bold;
}
.badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 12px;
    margin-right: 6px;
    margin-top: 6px;
    border: 1px solid rgba(255,255,255,0.15);
}
.sea {
    color: #7CFC98;
}
.sda {
    color: #FFD966;
}
.lsd {
    color: #FF7B7B;
}
.good {
    color: #7CFC98;
}
.warn {
    color: #FFD966;
}
.bad {
    color: #FF7B7B;
}
.anomaly {
    background: rgba(255, 123, 123, 0.12);
    color: #FF9A9A;
    border-color: rgba(255, 123, 123, 0.35);
}
.normal-badge {
    background: rgba(124, 252, 152, 0.10);
    color: #B9FFD1;
    border-color: rgba(124, 252, 152, 0.25);
}
.estimated-badge {
    background: rgba(255, 217, 102, 0.10);
    color: #FFE9A8;
    border-color: rgba(255, 217, 102, 0.25);
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 12px;
}
.small {
    color: #bbb;
    font-size: 13px;
}
pre {
    background: #0d0d0d;
    border: 1px solid #2e2e2e;
    border-radius: 8px;
    padding: 10px;
    max-height: 220px;
    overflow: auto;
    white-space: pre-wrap;
}
.kv {
    margin-top: 8px;
    line-height: 1.6;
}
.kv b {
    display: inline-block;
    min-width: 160px;
}
.divider {
    margin: 8px 0;
    border-top: 1px solid #2e2e2e;
}
</style>
</head>

<body>

<h2>🚌 Bus Intelligence Dashboard V4.1</h2>
<div class="small">
    Prediction = live ETA + same weekday + same time bucket historical trend from Supabase
</div>

<h3>Debug Log</h3>
<pre id="status">Starting...</pre>

<div class="section">
    <h3>📱 Real-Time Bus UI</h3>
    <div id="busList" class="grid"></div>
</div>

<div class="section">
    <h3>🤖 V4.1 Prediction (Per Bus Number)</h3>
    <div id="predictionList" class="grid"></div>
</div>

<div class="section">
    <h3>📊 Analytics (Per Bus Number, Supabase)</h3>
    <div id="analyticsList" class="grid"></div>
</div>

<!-- IMPORTANT: config.js must exist in the same folder -->
<script src="config.js"></script>

<script>
const statusEl = document.getElementById("status");
const busListEl = document.getElementById("busList");
const predictionListEl = document.getElementById("predictionList");
const analyticsListEl = document.getElementById("analyticsList");

function log(msg) {
    console.log(msg);
    statusEl.innerText += msg + "\\n";
}

function getMinutes(eta) {
    return Math.max(0, Math.round((new Date(eta) - new Date()) / 60000));
}

function getLoadClass(load) {
    if (load === "SEA") return "sea";
    if (load === "SDA") return "sda";
    if (load === "LSD") return "lsd";
    return "";
}

function median(arr) {
    if (!arr.length) return null;
    const sorted = [...arr].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    return sorted.length % 2 === 0
        ? (sorted[mid - 1] + sorted[mid]) / 2
        : sorted[mid];
}

function percentile(arr, p) {
    if (!arr.length) return null;
    const sorted = [...arr].sort((a, b) => a - b);
    const idx = Math.floor((p / 100) * (sorted.length - 1));
    return sorted[idx];
}

function average(arr) {
    if (!arr.length) return null;
    return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
}

function getWeekdayName(dateObj) {
    const d = new Date(dateObj);
    return d.toLocaleDateString("en-SG", { weekday: "short" }); // Mon, Tue...
}

// ✅ Configurable bucket size (15 / 30 / 60)
function getBucketMinutes() {
    if (!CONFIG.PREDICTION || !CONFIG.PREDICTION.BUCKET_MINUTES) return 30;
    return CONFIG.PREDICTION.BUCKET_MINUTES;
}

// Example bucket with 30:
// 14:00 / 14:30 / 15:00 / 15:30 ...
function getTimeBucket(dateObj) {
    const d = new Date(dateObj);
    const bucketMinutes = getBucketMinutes();
    const h = d.getHours();
    const m = d.getMinutes();

    const bucketStart = Math.floor(m / bucketMinutes) * bucketMinutes;
    return String(h).padStart(2, "0") + ":" + String(bucketStart).padStart(2, "0");
}

function matchHistoricalRow(row, targetServiceNo, targetStop, now) {
    if (row.service_no !== targetServiceNo) return false;
    if (row.bus_stop_code !== targetStop) return false;
    if (row.sequence !== "next") return false;

    const sameWeekdayRequired = CONFIG.PREDICTION && CONFIG.PREDICTION.SAME_WEEKDAY_ONLY;
    const targetWeekday = getWeekdayName(now);
    const rowWeekday = getWeekdayName(row.collected_at);

    if (sameWeekdayRequired && rowWeekday !== targetWeekday) {
        return false;
    }

    const currentBucket = getTimeBucket(now);
    const rowBucket = getTimeBucket(row.collected_at);

    if (rowBucket !== currentBucket) {
        return false;
    }

    const wait = Math.round(
        (new Date(row.estimated_arrival) - new Date(row.collected_at)) / 60000
    );

    return Number.isFinite(wait) && wait >= 0 && wait <= 120;
}

async function fetchLiveData() {
    const stop = CONFIG.BUS_STOPS[0];
    const url = "https://arrivelah2.busrouter.sg/?id=" + stop;
    log("Fetching live API: " + url);

    const resp = await fetch(url);
    if (!resp.ok) {
        throw new Error("Live API HTTP " + resp.status);
    }

    const data = await resp.json();
    log("Live API OK, services returned: " + (data.services ? data.services.length : 0));
    return data;
}

async function fetchHistoryRows() {
    const stop = CONFIG.BUS_STOPS[0];

    const url =
        CONFIG.SUPABASE_URL +
        "/rest/v1/bus_arrivals" +
        "?select=bus_stop_code,service_no,operator,sequence,estimated_arrival,collected_at,load,bus_type,feature,is_monitored" +
        "&bus_stop_code=eq." + encodeURIComponent(stop) +
        "&sequence=eq.next" +
        "&order=collected_at.desc" +
        "&limit=" + (CONFIG.HISTORY_LIMIT || 500);

    log("Fetching Supabase analytics: " + url);

    const resp = await fetch(url, {
        headers: {
            "apikey": CONFIG.SUPABASE_KEY,
            "Authorization": "Bearer " + CONFIG.SUPABASE_KEY
        }
    });

    if (!resp.ok) {
        const t = await resp.text();
        throw new Error("Supabase history HTTP " + resp.status + " -> " + t);
    }

    const rows = await resp.json();
    log("Supabase rows loaded: " + rows.length);
    return rows;
}

async function storeLiveSnapshot(data) {
    const stop = CONFIG.BUS_STOPS[0];
    let records = [];

    data.services.forEach(function(svc) {
        ["next", "next2", "next3"].forEach(function(seq) {
            const b = svc[seq];
            if (!b || !b.time) return;

            records.push({
                bus_stop_code: stop,
                service_no: svc.no,
                operator: svc.operator || null,
                sequence: seq,
                estimated_arrival: b.time,
                latitude: typeof b.lat === "number" ? b.lat : null,
                longitude: typeof b.lng === "number" ? b.lng : null,
                load: b.load || null,
                bus_type: b.type || null,
                feature: b.feature || null,
                is_monitored: b.monitored === 1,
                collected_at: new Date().toISOString()
            });
        });
    });

    if (records.length === 0) {
        log("No records to insert");
        return;
    }

    console.log("Sample record to insert:", records[0]);
    log("Sample record printed in console (F12)");

    const resp = await fetch(CONFIG.SUPABASE_URL + "/rest/v1/bus_arrivals", {
        method: "POST",
        headers: {
            "apikey": CONFIG.SUPABASE_KEY,
            "Authorization": "Bearer " + CONFIG.SUPABASE_KEY,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        },
        body: JSON.stringify(records)
    });

    if (!resp.ok) {
        const t = await resp.text();
        throw new Error("Supabase insert HTTP " + resp.status + " -> " + t);
    }

    log("Stored " + records.length + " rows to Supabase");
}

function renderLiveUI(liveData) {
    busListEl.innerHTML = "";

    liveData.services.forEach(function(svc) {
        if (!svc.next || !svc.next.time) return;

        const nextMin = getMinutes(svc.next.time);
        const next2Min = svc.next2 && svc.next2.time ? getMinutes(svc.next2.time) : null;
        const next3Min = svc.next3 && svc.next3.time ? getMinutes(svc.next3.time) : null;

        const gap = next2Min !== null ? (next2Min - nextMin) : null;
        const delayFlag = gap !== null && gap > (CONFIG.DELAY_THRESHOLD_MINUTES || 15);

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="bus-no">Bus ${svc.no} (${svc.operator || "Unknown"})</div>
            <div class="${getLoadClass(svc.next.load)}">
                Next: ${nextMin} mins | Load: ${svc.next.load || "N/A"} | Type: ${svc.next.type || "N/A"}
            </div>
            <div>Next2: ${next2Min !== null ? next2Min + " mins" : "-"}</div>
            <div>Next3: ${next3Min !== null ? next3Min + " mins" : "-"}</div>
            <div class="small">
                ${svc.next.feature ? "Feature: " + svc.next.feature + " | " : ""}
                ${svc.next.monitored === 1 ? "Live GPS" : "Estimated"}
            </div>
            ${delayFlag ? `<div class="warn">⚠ Large gap detected (${gap} mins between next and next2)</div>` : ""}
        `;

        busListEl.appendChild(div);
    });
}

function renderPredictions(liveData, historyRows) {
    predictionListEl.innerHTML = "";

    const now = new Date();
    const currentBucket = getTimeBucket(now);
    const currentWeekday = getWeekdayName(now);

    liveData.services.forEach(function(svc) {
        if (!svc.next || !svc.next.time) return;

        const serviceNo = svc.no;
        const stop = CONFIG.BUS_STOPS[0];
        const liveWait = getMinutes(svc.next.time);

        const matchedRows = historyRows.filter(function(r) {
            return matchHistoricalRow(r, serviceNo, stop, now);
        });

        const waits = matchedRows.map(function(r) {
            return Math.round(
                (new Date(r.estimated_arrival) - new Date(r.collected_at)) / 60000
            );
        });

        const histMedian = median(waits);
        const histAvg = average(waits);
        const p25 = percentile(waits, 25);
        const p75 = percentile(waits, 75);

        // ✅ Hybrid prediction
        let predictedWait;
        if (histMedian !== null) {
            predictedWait = Math.round(
                (CONFIG.PREDICTION.LIVE_WEIGHT * liveWait) +
                (CONFIG.PREDICTION.HISTORY_WEIGHT * histMedian)
            );
        } else {
            predictedWait = liveWait;
        }

        const predictedArrival = new Date(Date.now() + predictedWait * 60000);

        // ✅ anomaly logic: live ETA > historical p75
        let anomalyBadge = "";
        if (p75 !== null && liveWait > p75) {
            anomalyBadge = `<span class="badge anomaly">Delay anomaly: live ETA > historical P75</span>`;
        } else {
            anomalyBadge = `<span class="badge normal-badge">Within normal range</span>`;
        }

        let trendLabel = "No historical baseline";
        let trendClass = "warn";

        if (histMedian !== null) {
            if (liveWait > histMedian + 3) {
                trendLabel = "Slower than normal";
                trendClass = "bad";
            } else if (liveWait < histMedian - 2) {
                trendLabel = "Faster than normal";
                trendClass = "good";
            } else {
                trendLabel = "Near normal";
                trendClass = "warn";
            }
        }

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="bus-no">Bus ${serviceNo}</div>
            <div class="small">Matching rule: ${currentWeekday}, bucket ${currentBucket}, ${getBucketMinutes()}-minute window</div>
            <div class="divider"></div>
            <div class="kv"><b>Live ETA now:</b> ${liveWait} mins</div>
            <div class="kv"><b>Historical average:</b> ${histAvg !== null ? histAvg + " mins" : "Not enough data"}</div>
            <div class="kv"><b>Historical median:</b> ${histMedian !== null ? histMedian + " mins" : "Not enough data"}</div>
            <div class="kv"><b>Confidence band:</b> ${p25 !== null && p75 !== null ? p25 + "–" + p75 + " mins" : "N/A"}</div>
            <div class="kv"><b>Predicted wait:</b> ${predictedWait} mins</div>
            <div class="kv"><b>Predicted arrival:</b> ${predictedArrival.toLocaleTimeString()}</div>
            <div class="divider"></div>
            <div class="${trendClass}">${trendLabel}</div>
            <div>${anomalyBadge}</div>
            <div class="small">Historical matched samples: ${waits.length}</div>
        `;

        predictionListEl.appendChild(div);
    });
}

function renderAnalytics(historyRows) {
    analyticsListEl.innerHTML = "";

    const grouped = {};

    historyRows.forEach(function(r) {
        if (r.sequence !== "next") return;

        const wait = Math.round(
            (new Date(r.estimated_arrival) - new Date(r.collected_at)) / 60000
        );

        if (!Number.isFinite(wait) || wait < 0 || wait > 120) return;

        const serviceNo = r.service_no;
        if (!grouped[serviceNo]) grouped[serviceNo] = [];
        grouped[serviceNo].push(wait);
    });

    Object.keys(grouped).sort(function(a, b) {
        return Number(a) - Number(b);
    }).forEach(function(serviceNo) {
        const waits = grouped[serviceNo];
        const avg = average(waits);
        const med = median(waits);
        const min = Math.min(...waits);
        const max = Math.max(...waits);
        const p25 = percentile(waits, 25);
        const p75 = percentile(waits, 75);

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <div class="bus-no">Bus ${serviceNo}</div>
            <div class="kv"><b>Samples:</b> ${waits.length}</div>
            <div class="kv"><b>Average wait:</b> ${avg} mins</div>
            <div class="kv"><b>Median wait:</b> ${med} mins</div>
            <div class="kv"><b>P25 / P75:</b> ${p25} / ${p75} mins</div>
            <div class="kv"><b>Fastest observed:</b> ${min} mins</div>
            <div class="kv"><b>Slowest observed:</b> ${max} mins</div>
        `;
        analyticsListEl.appendChild(div);
    });
}

async function main() {
    try {
        log("Starting refresh cycle...");
        log("Prediction mode: same weekday matching + configurable bucket size");

        const liveData = await fetchLiveData();
        renderLiveUI(liveData);

        const historyRows = await fetchHistoryRows();
        renderPredictions(liveData, historyRows);
        renderAnalytics(historyRows);

        await storeLiveSnapshot(liveData);

        log("Refresh cycle completed");
    } catch (e) {
        log("ERROR: " + e.message);
    }
}

main();
setInterval(main, CONFIG.REFRESH_INTERVAL_MS);
</script>

</body>
</html>
