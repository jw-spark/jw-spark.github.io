<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bus Intelligence Dashboard</title>

<style>
body { font-family: Arial; background: #111; color: #fff; padding: 20px; }

.card {
    background: #222;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
}

.bus-no { font-size: 20px; font-weight: bold; }

.sea { color: lightgreen; }
.sda { color: yellow; }
.lsd { color: red; }

.header { font-size: 22px; margin-bottom: 10px; }

</style>

</head>

<body>

<div class="header">🚌 Bus Intelligence Dashboard</div>

<pre id="status">Starting...</pre>

<h3>📱 Real-time Bus</h3>
<div id="busContainer"></div>

<h3>🤖 Prediction</h3>
<div id="prediction"></div>

<script src="config.js"></script>

<script>

const statusEl = document.getElementById("status");
const busContainer = document.getElementById("busContainer");
const predictionEl = document.getElementById("prediction");

// ✅ logging
function log(msg){
    console.log(msg);
    statusEl.innerText += msg + "\\n";
}

// ✅ classify load color
function getLoadClass(load){
    if(load === "SEA") return "sea";
    if(load === "SDA") return "sda";
    if(load === "LSD") return "lsd";
    return "";
}

// ✅ calculate minutes to arrival
function getMinutes(eta){
    const diff = new Date(eta) - new Date();
    return Math.round(diff / 60000);
}

// ✅ main fetch
async function fetchBus(){

    try{
        const stop = CONFIG.BUS_STOPS[0];
        log("Fetching API...");

        const resp = await fetch("https://arrivelah2.busrouter.sg/?id=" + stop);
        const data = await resp.json();

        log("API OK");

        renderBus(data);
        detectDelay(data);
        prediction(data);

    }catch(e){
        log("ERROR: " + e.message);
    }
}

// ✅ render UI
function renderBus(data){

    busContainer.innerHTML = "";

    data.services.forEach(svc => {

        const div = document.createElement("div");
        div.className = "card";

        const next = svc.next;
        const next2 = svc.next2;

        div.innerHTML = `
            <div class="bus-no">Bus ${svc.no} (${svc.operator})</div>
            <div class="${getLoadClass(next.load)}">
                Next: ${getMinutes(next.time)} mins | Load: ${next.load} | ${next.type}
            </div>
            <div>
                Next2: ${getMinutes(next2.time)} mins
            </div>
        `;

        busContainer.appendChild(div);
    });

}

// ✅ delay detection
function detectDelay(data){

    data.services.forEach(svc => {

        const next = svc.next;
        const next2 = svc.next2;

        const gap = getMinutes(next2.time) - getMinutes(next.time);

        if(gap > 15){
            log("⚠️ Possible delay detected for Bus " + svc.no);
        }

    });
}

// ✅ simple prediction
function prediction(data){

    let total = 0;
    let count = 0;

    data.services.forEach(svc => {
        const eta = svc.next.time;
        const mins = getMinutes(eta);

        total += mins;
        count++;
    });

    if(count === 0) return;

    const avg = Math.round(total / count);

    predictionEl.innerHTML = `
        ✅ Avg waiting time: ${avg} mins
    `;
}

// ✅ store into supabase
async function store(data){

    const stop = CONFIG.BUS_STOPS[0];
    let records = [];

    data.services.forEach(svc => {

        ["next","next2","next3"].forEach(seq => {

            const b = svc[seq];
            if (!b || !b.time) return;

            records.push({
                bus_stop_code: stop,
                service_no: svc.no,
                operator: svc.operator,
                sequence: seq,
                estimated_arrival: b.time,
                latitude: b.lat,
                longitude: b.lng,
                load: b.load,
                bus_type: b.type,
                feature: b.feature,
                is_monitored: b.monitored === 1,
                collected_at: new Date().toISOString()
            });

        });

    });

    await fetch(CONFIG.SUPABASE_URL + "/rest/v1/bus_arrivals",{
        method:"POST",
        headers:{
            "apikey": CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + CONFIG.SUPABASE_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify(records)
    });

    log("Stored into DB");
}

// ✅ main cycle
async function main(){

    const resp = await fetch("https://arrivelah2.busrouter.sg/?id=" + CONFIG.BUS_STOPS[0]);
    const data = await resp.json();

    renderBus(data);
    detectDelay(data);
    prediction(data);
    store(data);
}

// ✅ run
main();
setInterval(main, CONFIG.REFRESH_INTERVAL_MS);

</script>

</body>
</html>
