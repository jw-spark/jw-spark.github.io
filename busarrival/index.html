// ✅ Safe fetch
async function safeFetch(url, options = {}) {
    log("Calling: " + url);

    const res = await fetch(url, options);

    if (!res.ok) {
        const text = await res.text();
        throw new Error("HTTP " + res.status + " -> " + text);
    }

    return res;
}
