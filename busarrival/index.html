<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bus Intelligence Dashboard V2</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }

.section { margin-bottom:20px; }

.card {
    background:#222;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
}

.bus-no { font-size:20px; font-weight:bold; }

.sea { color:lightgreen; }
.sda { color:yellow; }
.lsd { color:red; }

.warn { color:orange; }

</style>
</head>

<body>

<h2>🚌 Bus Intelligence Dashboard V2</h2>
<pre id="status">Starting...</pre>

<div class="section">
<h3>📱 Real-time Bus</h3>
<div id="busList"></div>
</div>

<div class="section">
<h3>🤖 Prediction</h3>
<div id="prediction"></div>
</div>

<div class="section">
<h3>📊 Quick Insights</h3>
<div id="insight"></div>
</div>

<script src="config.js"></script>

<script>
const statusEl = document.getElementById("status");
const busList = document.getElementById("busList");
const predictionEl = document.getElementById("prediction");
const insightEl = document.getElementById("insight");

// ✅ logger
function log(msg){
    console.log(msg);
    statusEl.innerText += msg + "\\n";
}

// ✅ load color
function getLoadClass(load){
    return load === "SEA" ? "sea" :
           load === "SDA" ? "sda" :
           load === "LSD" ? "lsd" : "";
}

// ✅ ETA minutes
function getMins(t){
    return Math.max(0, Math.round((new Date(t) - new Date()) / 60000));
}

// ✅ render buses
function render(data){

    busList.innerHTML = "";

    let waits = [];

    data.services.forEach(svc => {

        const next = svc.next;
        const next2 = svc.next2;

        if (!next || !next.time) return;

        const m1 = getMins(next.time);
        const m2 = next2 ? getMins(next2.time) : "-";

        waits.push(m1);

        let delayWarn = "";
        if (next2 && (m2 - m1) > 15){
            delayWarn = "<div class='warn'>⚠ Possible delay</div>";
            log("Delay for Bus " + svc.no);
        }

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="bus-no">Bus ${svc.no} (${svc.operator})</div>
            <div class="${getLoadClass(next.load)}">
                Next: ${m1} mins | ${next.load} | ${next.type}
            </div>
            <div>Next2: ${m2} mins</div>
            ${delayWarn}
        `;

        busList.appendChild(div);
    });

    updatePrediction(waits);
    updateInsights(data);
}

// ✅ prediction logic
function updatePrediction(waits){

    if(waits.length === 0) return;

    const avg = Math.round(waits.reduce((a,b)=>a+b,0) / waits.length);
    const min = Math.min(...waits);
    const max = Math.max(...waits);

    predictionEl.innerHTML = `
        Avg wait: ${avg} mins <br>
        Shortest wait: ${min} mins <br>
        Longest wait: ${max} mins
    `;
}

// ✅ simple analytics insight
function updateInsights(data){

    const count = data.services.length;

    insightEl.innerHTML = `
        Active services: ${count} <br>
        Data sourced live from API
    `;
}

// ✅ store DB
async function store(data){

    const stop = CONFIG.BUS_STOPS[0];

    let records = [];

    data.services.forEach(svc => {

        ["next","next2","next3"].forEach(seq => {

            const b = svc[seq];
            if (!b || !b.time) return;

            records.push({
                bus_stop_code: stop,
                service_no: svc.no,
                operator: svc.operator,
                sequence: seq,
                estimated_arrival: b.time,
                latitude: b.lat,
                longitude: b.lng,
                load: b.load,
                bus_type: b.type,
                feature: b.feature,
                is_monitored: b.monitored === 1,
                collected_at: new Date().toISOString()
            });

        });

    });

    await fetch(CONFIG.SUPABASE_URL + "/rest/v1/bus_arrivals", {
        method:"POST",
        headers:{
            "apikey": CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + CONFIG.SUPABASE_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify(records)
    });

    log("Data stored");
}

// ✅ main loop
async function main(){

    try{
        const stop = CONFIG.BUS_STOPS[0];

        log("Fetching API...");
        const resp = await fetch("https://arrivelah2.busrouter.sg/?id=" + stop);
        const data = await resp.json();

        render(data);
        store(data);

    }catch(e){
        log("ERROR: " + e.message);
    }
}

// ✅ run
main();
setInterval(main, CONFIG.REFRESH_INTERVAL_MS);

</script>

</body>
</html>
