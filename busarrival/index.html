<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bus Intelligence Dashboard V3</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }

.section { margin-bottom:20px; }

.card {
    background:#222;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
}

.bus-no { font-size:20px; font-weight:bold; }

.sea { color:lightgreen; }
.sda { color:yellow; }
.lsd { color:red; }

.warn { color:orange; }
</style>

</head>

<body>

<h2>🚌 Bus Intelligence Dashboard V3</h2>
<pre id="status">Starting...</pre>

<div class="section">
<h3>📱 Real-time Bus</h3>
<div id="busList"></div>
</div>

<div class="section">
<h3>🤖 Prediction</h3>
<div id="prediction"></div>
</div>

<div class="section">
<h3>📊 Analytics (Supabase)</h3>
<div id="analytics"></div>
</div>

<!-- ✅ CORRECT SCRIPT (important fix) -->
<script src="config.js"></script>

<script>

const statusEl = document.getElementById("status");
const busList = document.getElementById("busList");
const predictionEl = document.getElementById("prediction");
const analyticsEl = document.getElementById("analytics");

// ✅ log helper
function log(msg){
    console.log(msg);
    statusEl.innerText += msg + "\n";
}

// ✅ ETA in minutes
function getMins(t){
    return Math.max(0, Math.round((new Date(t) - new Date()) / 60000));
}

// ✅ load color
function loadClass(load){
    if(load==="SEA") return "sea";
    if(load==="SDA") return "sda";
    if(load==="LSD") return "lsd";
    return "";
}

// ✅ render UI
function render(data){

    busList.innerHTML = "";
    let waits = [];

    data.services.forEach(svc => {

        if(!svc.next || !svc.next.time) return;

        let m1 = getMins(svc.next.time);
        let m2 = svc.next2 ? getMins(svc.next2.time) : "-";

        waits.push(m1);

        let warn = "";
        if(svc.next2 && (m2 - m1) > 15){
            warn = "<div class='warn'>⚠ Delay detected</div>";
        }

        let div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
            <div class="bus-no">Bus ${svc.no} (${svc.operator})</div>
            <div class="${loadClass(svc.next.load)}">
                Next: ${m1} mins | ${svc.next.load} | ${svc.next.type}
            </div>
            <div>Next2: ${m2} mins</div>
            ${warn}
        `;

        busList.appendChild(div);
    });

    updatePrediction(waits);
}

// ✅ prediction
function updatePrediction(waits){
    if(waits.length === 0) return;

    let avg = Math.round(waits.reduce((a,b)=>a+b,0)/waits.length);
    let min = Math.min(...waits);
    let max = Math.max(...waits);

    predictionEl.innerHTML = `
        Avg wait: ${avg} mins <br>
        Shortest: ${min} mins <br>
        Longest: ${max} mins
    `;
}

// ✅ supabase analytics
async function loadAnalytics(){

    try{

        const url = CONFIG.SUPABASE_URL + "/rest/v1/bus_arrivals?select=service_no,estimated_arrival,collected_at&limit=200";

        let resp = await fetch(url,{
            headers:{
                "apikey": CONFIG.SUPABASE_KEY
            }
        });

        let data = await resp.json();

        log("Loaded analytics rows: " + data.length);

        let map = {};

        data.forEach(r=>{
            let mins = Math.round((new Date(r.estimated_arrival) - new Date(r.collected_at))/60000);
            if(!map[r.service_no]) map[r.service_no]=[];
            map[r.service_no].push(mins);
        });

        let out = "";

        for(let svc in map){
            let avg = Math.round(map[svc].reduce((a,b)=>a+b,0)/map[svc].length);
            out += `Bus ${svc} avg wait: ${avg} mins<br>`;
        }

        analyticsEl.innerHTML = out;

    }catch(e){
        log("Analytics error: " + e.message);
    }

}

// ✅ store to DB
async function store(data){

    const stop = CONFIG.BUS_STOPS[0];

    let records=[];

    data.services.forEach(svc=>{
        ["next","next2","next3"].forEach(seq=>{
            let b = svc[seq];
            if(!b || !b.time) return;

            records.push({
                bus_stop_code: stop,
                service_no: svc.no,
                operator: svc.operator,
                sequence: seq,
                estimated_arrival: b.time,
                load: b.load,
                bus_type: b.type,
                collected_at: new Date().toISOString()
            });
        });
    });

    await fetch(CONFIG.SUPABASE_URL + "/rest/v1/bus_arrivals",{
        method:"POST",
        headers:{
            "apikey":CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + CONFIG.SUPABASE_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify(records)
    });

    log("Stored to DB");
}

// ✅ main
async function main(){

    try{
        log("Fetching API...");

        let resp = await fetch("https://arrivelah2.busrouter.sg/?id=" + CONFIG.BUS_STOPS[0]);
        let data = await resp.json();

        render(data);
        store(data);
        loadAnalytics();

    }catch(e){
        log("ERROR: " + e.message);
    }
}

main();
setInterval(main, CONFIG.REFRESH_INTERVAL_MS);

</script>

</body>
</html>
